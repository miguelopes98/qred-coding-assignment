name: template-ts-semantic-release

on:
  push:
    branches: [$default-branch]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: 22.x

jobs:
  integration-test:
    name: Run integration tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: integration_test
          MYSQL_PASSWORD: integration_test
          MYSQL_DATABASE: integration_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node and install dependencies
        uses: ./.github/actions
        with:
          npm_token: ${{ secrets.ADVISA_NPM_TOKEN }}
          node_version: ${{ env.NODE_VERSION }}

      - run: npm run test:integration:ci

      - name: Generate LCOV test coverage report
        run: npm run test-coverage:lcov

      - name: Preserve coverage report to be used in SonarCloud scan job
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  type-check:
    name: Typescript build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node and install dependencies
        uses: ./.github/actions
        with:
          npm_token: ${{ secrets.ADVISA_NPM_TOKEN }}
          node_version: ${{ env.NODE_VERSION }}

      - run: npm run build:check

  prettier-check:
    name: Prettier format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node and install dependencies
        uses: ./.github/actions
        with:
          npm_token: ${{ secrets.ADVISA_NPM_TOKEN }}
          node_version: ${{ env.NODE_VERSION }}

      - run: npm run format:check

  lint:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node and install dependencies
        uses: ./.github/actions
        with:
          npm_token: ${{ secrets.ADVISA_NPM_TOKEN }}
          node_version: ${{ env.NODE_VERSION }}

      - run: npm run lint

  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node and install dependencies
        uses: ./.github/actions
        with:
          npm_token: ${{ secrets.ADVISA_NPM_TOKEN }}
          node_version: ${{ env.NODE_VERSION }}

      - run: npm test

  sonarcloud-scan:
    needs: integration-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node and install dependencies
        uses: ./.github/actions
        with:
          npm_token: ${{ secrets.ADVISA_NPM_TOKEN }}
          node_version: ${{ env.NODE_VERSION }}

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.INSURANCE_SONAR_TOKEN }}
