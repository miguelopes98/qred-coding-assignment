services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      - DATABASE_URL=mysql://dev:dev@db:3306/dev
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
      MYSQL_DATABASE: dev
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysql', '-h', 'localhost', '-u', 'dev', '-pdev', 'dev', '-e', 'SELECT 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
